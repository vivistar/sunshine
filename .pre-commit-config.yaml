# Pre-commit hooks: stop secrets and junk from being committed.
#
# Set up once per clone:
#   pipx install pre-commit     # or: pip install pre-commit / brew install pre-commit
#   pre-commit install          # installs the git hook
#
# Run on demand against the whole repo:
#   pre-commit run --all-files
#
# Reusable across projects: copy this file into any repo, then run the two
# commands above. Versions are pinned; bump with `pre-commit autoupdate`.
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks            # scan staged changes for secrets / credentials

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: detect-private-key  # block committing private keys
      - id: check-added-large-files
        args: ["--maxkb=2048"]  # avoid committing big blobs (e.g. databases)
