<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Sunshine Surveys{% endblock %}</title>
  <style>
    :root {
      --sun: #e8a13a; --sun-dark: #c8821f; --ink: #2b2b2b;
      --muted: #6b6b6b; --line: #e5e2dc; --bg: #fbf7ef; --card: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, Arial, sans-serif; color: var(--ink); background: var(--bg);
      line-height: 1.5;
    }
    header.topbar {
      background: linear-gradient(120deg, var(--sun), var(--sun-dark));
      color: #fff; padding: 14px 24px;
    }
    header.topbar a { color: #fff; text-decoration: none; font-weight: 600; }
    .wrap { max-width: 920px; margin: 0 auto; padding: 24px; }
    h1, h2, h3 { line-height: 1.2; }
    a { color: var(--sun-dark); }
    .card {
      background: var(--card); border: 1px solid var(--line);
      border-radius: 10px; padding: 18px 20px; margin-bottom: 18px;
    }
    .muted { color: var(--muted); }
    .pill {
      display: inline-block; font-size: 12px; font-weight: 600;
      padding: 2px 10px; border-radius: 999px; text-transform: uppercase;
      letter-spacing: .03em;
    }
    .pill.draft { background: #eee; color: #666; }
    .pill.active { background: #e3f4e1; color: #2e7d32; }
    .pill.closed { background: #fce4e4; color: #c62828; }
    label { display: block; font-weight: 600; margin: 10px 0 4px; }
    input[type=text], input[type=email], input[type=number], textarea, select {
      width: 100%; padding: 9px 11px; border: 1px solid var(--line);
      border-radius: 7px; font: inherit; background: #fff;
    }
    textarea { min-height: 80px; resize: vertical; }
    .row { display: flex; gap: 16px; flex-wrap: wrap; }
    .row > * { flex: 1; min-width: 140px; }
    button, .btn {
      background: var(--sun); color: #fff; border: 0; padding: 10px 18px;
      border-radius: 7px; font: inherit; font-weight: 600; cursor: pointer;
      text-decoration: none; display: inline-block;
    }
    button:hover, .btn:hover { background: var(--sun-dark); }
    .btn.secondary { background: #fff; color: var(--ink); border: 1px solid var(--line); }
    .btn.danger { background: #fff; color: #c62828; border: 1px solid #f3c9c9; padding: 5px 10px; font-size: 13px;}
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--line); }
    th { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: .03em; }
    .bar { background: #f0ece3; border-radius: 6px; overflow: hidden; height: 18px; }
    .bar > span { display: block; height: 100%; background: var(--sun); }
    .notice { background: #fff7e8; border: 1px solid #f3dca6; padding: 10px 14px; border-radius: 8px; }
    .error { background: #fdeaea; border: 1px solid #f3c9c9; color: #b03030; padding: 10px 14px; border-radius: 8px; }
    .inline { display: inline; }
    small.hint { color: var(--muted); font-weight: 400; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="wrap" style="padding:0; max-width:920px;">
      <a href="/">☀ Sunshine Surveys</a>
    </div>
  </header>
  <div class="wrap">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
